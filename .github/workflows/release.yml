name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version
        required: true
        type: string
      release_kind:
        description: Release kind
        required: true
        type: choice
        options:
          - release
          - pre-release

permissions:
  contents: write

env:
  VINTAGE_STORY_BUILD_VERSION: 1.22.3

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Run tests
        run: dotnet test

      - name: Build package
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          dotnet run --project src/Packer -- pack --config config/packer/default.json --package-version "${VERSION}"

      - name: Generate release notes
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          RELEASE_KIND: ${{ inputs.release_kind }}
        run: |
          notes_path="build/release-notes-${VERSION}.md"
          readme_path="build/README-${VERSION}.md"
          dotnet run --project src/Packer -- describe-release --config config/packer/default.json --package-version "${VERSION}" --release-kind "${RELEASE_KIND}" --fetch-api > "${notes_path}"
          dotnet run --project src/Packer -- describe-package --config config/packer/default.json --package-version "${VERSION}" --fetch-api > "${readme_path}"

      - name: Add README to package
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          zip_path="build/VintageStory-Chinese-Language-Package-${VERSION}.zip"
          readme_path="build/README-${VERSION}.md"
          export ZIP_PATH="${zip_path}"
          export README_PATH="${readme_path}"
          python3 - <<'PY'
          from pathlib import Path
          import zipfile
          import os

          zip_path = Path(os.environ["ZIP_PATH"])
          readme_path = Path(os.environ["README_PATH"])

          with zipfile.ZipFile(zip_path, "a", compression=zipfile.ZIP_DEFLATED) as archive:
              archive.write(readme_path, "README.md")
          PY

      - name: Download Vintage Story API
        shell: bash
        run: |
          vintage_story_dir="${RUNNER_TEMP}/vintagestory"
          archive_path="${RUNNER_TEMP}/vs-server.tar.gz"
          mkdir -p "${vintage_story_dir}"
          curl -fsSL "https://cdn.vintagestory.at/gamefiles/stable/vs_server_linux-x64_${VINTAGE_STORY_BUILD_VERSION}.tar.gz" -o "${archive_path}"
          tar -xzf "${archive_path}" -C "${vintage_story_dir}"
          test -f "${vintage_story_dir}/VintagestoryAPI.dll"
          echo "VINTAGE_STORY=${vintage_story_dir}" >> "${GITHUB_ENV}"

      - name: Build updater mod
        shell: bash
        run: dotnet build src/Updater/Updater.csproj -c Release

      - name: Stamp updater mod version
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("src/Updater/bin/Release/mod/modinfo.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          data["version"] = os.environ["VERSION"]
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Pack updater mod
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          updater_zip="${GITHUB_WORKSPACE}/build/vscnlangpackupdater-${VERSION}.zip"
          mkdir -p build
          (cd src/Updater/bin/Release/mod && zip -r "${updater_zip}" .)

      - name: Create release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          VERSION: ${{ inputs.version }}
          RELEASE_KIND: ${{ inputs.release_kind }}
        run: |
          gh release create "v${VERSION}" \
            --target "${GITHUB_SHA}" \
            "build/VintageStory-Chinese-Language-Package-${VERSION}.zip" \
            "build/vscnlangpackupdater-${VERSION}.zip" \
            --title "VintageStory-Chinese-Language-Package ${VERSION}" \
            --notes-file "build/release-notes-${VERSION}.md" \
            $( [ "${RELEASE_KIND}" = "pre-release" ] && echo --prerelease )
